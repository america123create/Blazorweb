{% extends "base.html" %}

{% block title %}Inicio - Blazor{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="container">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Bienvenido a</span>
                <span class="title-highlight">Mundo Blazor</span>
            </h1>
            <!-- <p class="hero-description">
                Un sitio web moderna con validaciones en tiempo real, 
                navegación intuitiva y manejo robusto de errores.
            </p> -->
            
            {% if session.usuario %}
                <div class="hero-actions">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-large">
                        <span>Ir al Dashboard</span>
                        <span class="btn-icon">→</span>
                    </a>
                </div>
                <div class="welcome-message">
                    <span class="welcome-icon">👋</span>
                    <span>Hola, <strong>{{ session.usuario }}</strong></span>
                </div>
            {% else %}
                <div class="hero-actions">
                    <a href="{{ url_for('registro') }}" class="btn btn-primary btn-large">
                        <span>Comenzar ahora</span>
                        <span class="btn-icon">→</span>
                    </a>
                    <a href="{{ url_for('login') }}" class="btn btn-secondary btn-large">
                        <span>Iniciar sesión</span>
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</div>
